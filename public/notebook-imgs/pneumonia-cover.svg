<svg viewBox="0 0 460 200" xmlns="http://www.w3.org/2000/svg" style="background:#010409">

  <!-- Grid lines -->
  <line x1="0" y1="50" x2="460" y2="50" stroke="#0ea5e911" stroke-width="1"/>
  <line x1="0" y1="100" x2="460" y2="100" stroke="#0ea5e911" stroke-width="1"/>
  <line x1="0" y1="150" x2="460" y2="150" stroke="#0ea5e911" stroke-width="1"/>
  <line x1="115" y1="0" x2="115" y2="200" stroke="#0ea5e911" stroke-width="1"/>
  <line x1="230" y1="0" x2="230" y2="200" stroke="#0ea5e911" stroke-width="1"/>
  <line x1="345" y1="0" x2="345" y2="200" stroke="#0ea5e911" stroke-width="1"/>

  <!-- Scan line animation effect (static bands) -->
  <rect x="0" y="0" width="460" height="200" fill="url(#scanlines)" opacity="0.4"/>
  <defs>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="3" fill="transparent"/>
      <rect x="0" y="3" width="1" height="1" fill="#0ea5e9" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Left panel: accuracy metric -->
  <rect x="20" y="20" width="185" height="160" rx="8" fill="#0c1929" stroke="#0ea5e922" stroke-width="1"/>
  <rect x="20" y="20" width="185" height="3" rx="2" fill="#0ea5e9"/>
  <text x="112" y="75" text-anchor="middle" fill="#0ea5e9" font-size="44" font-weight="800" font-family="'Space Grotesk', sans-serif">98.8%</text>
  <text x="112" y="103" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700" font-family="'Space Grotesk', sans-serif">Field Accuracy</text>
  <text x="112" y="122" text-anchor="middle" fill="#8b949e" font-size="10" font-family="'Space Grotesk', sans-serif">post-augmentation</text>
  <!-- Baseline comparison -->
  <text x="112" y="152" text-anchor="middle" fill="#374151" font-size="9" font-family="'Space Grotesk', sans-serif">baseline: 74.7%  →  +24.1pp lift</text>

  <!-- Right panel: model info -->
  <rect x="255" y="20" width="185" height="160" rx="8" fill="#0c1929" stroke="#0ea5e922" stroke-width="1"/>
  <rect x="255" y="20" width="185" height="3" rx="2" fill="#0ea5e9"/>
  <text x="347" y="65" text-anchor="middle" fill="#0ea5e9" font-size="13" font-weight="700" font-family="'Space Grotesk', sans-serif" letter-spacing="2">CNN CLASSIFIER</text>
  <text x="347" y="90" text-anchor="middle" fill="#8b949e" font-size="10" font-family="'Space Grotesk', sans-serif">TensorFlow · Keras</text>

  <!-- Mini bar: 74.7 vs 98.8 -->
  <rect x="280" y="105" width="134" height="6" rx="3" fill="#21262d"/>
  <rect x="280" y="105" width="100" height="6" rx="3" fill="#374151"/>
  <text x="280" y="122" fill="#4b5563" font-size="8" font-family="'Space Grotesk', sans-serif">74.7%</text>

  <rect x="280" y="130" width="134" height="6" rx="3" fill="#21262d"/>
  <rect x="280" y="130" width="132" height="6" rx="3" fill="#0ea5e9"/>
  <text x="280" y="147" fill="#0ea5e9" font-size="8" font-family="'Space Grotesk', sans-serif" font-weight="700">98.8%</text>

  <text x="347" y="175" text-anchor="middle" fill="#21262d" font-size="8" font-family="'Space Grotesk', sans-serif">MIT INSPIRIT AI · 2023</text>

</svg>
