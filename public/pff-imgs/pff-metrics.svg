<svg viewBox="0 0 460 185" xmlns="http://www.w3.org/2000/svg" style="background:#010409">

  <!-- Left metric: 3x Retention -->
  <rect x="20" y="20" width="200" height="145" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="120" y="72" text-anchor="middle" fill="#2563eb" font-size="52" font-weight="800" font-family="'Space Grotesk', sans-serif">3x</text>
  <text x="120" y="100" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700" font-family="'Space Grotesk', sans-serif">Retention</text>
  <text x="120" y="120" text-anchor="middle" fill="#8b949e" font-size="11" font-family="'Space Grotesk', sans-serif">post-launch increase</text>
  <rect x="20" y="20" width="200" height="4" rx="2" fill="#2563eb"/>

  <!-- Right metric: 3x DAU -->
  <rect x="240" y="20" width="200" height="145" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="340" y="72" text-anchor="middle" fill="#2563eb" font-size="52" font-weight="800" font-family="'Space Grotesk', sans-serif">3x</text>
  <text x="340" y="100" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700" font-family="'Space Grotesk', sans-serif">Daily Active Users</text>
  <text x="340" y="120" text-anchor="middle" fill="#8b949e" font-size="11" font-family="'Space Grotesk', sans-serif">post-launch increase</text>
  <rect x="240" y="20" width="200" height="4" rx="2" fill="#2563eb"/>

</svg>
